name: TestFlight

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "constants/**"
      - "assets/**"
      - "types/**"
      - "patches/**"
      - "app.json"
      - "app.config.js"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/testflight.yml"
  workflow_dispatch: {}

jobs:
  build-and-submit:
    name: Build & submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build & submit iOS (production)
        run: eas build --platform ios --profile production --non-interactive --auto-submit
