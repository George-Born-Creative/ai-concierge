# borncreative.net — WordPress + AI-Concierge Nest API on the same domain.
#
# GHL Marketplace redirect URL: https://borncreative.net/
# After OAuth, Nest responds 302 → aiconcierge://oauth/ghl?status=ok (app opens automatically).
#
# Install: copy into /etc/nginx/sites-available/ and symlink sites-enabled.
# Nest must run on 127.0.0.1:4000 (pm2, systemd, etc.).

map $arg_code $ghl_oauth_callback {
    default 0;
    "~.+"   1;
}

upstream ai_concierge_api {
    server 127.0.0.1:4000;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name borncreative.net www.borncreative.net;

    # ssl_certificate /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    client_max_body_size 25m;

    # ─── Nest API (mobile app) ───────────────────────────────────────────────
    location /health {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    location /oauth/ {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    location /auth/ {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    location /integrations/ {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    location /billing/ {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    location /webhooks/ {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    location /voice/ {
        proxy_pass http://ai_concierge_api;
        include /etc/nginx/proxy_params;
    }

    # GHL redirect_uri = https://borncreative.net/?code=...&state=...
    location = / {
        if ($ghl_oauth_callback) {
            proxy_pass http://ai_concierge_api;
            break;
        }
        try_files $uri $uri/ /index.php?$args;
    }

    # ─── WordPress (everything else) ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}
